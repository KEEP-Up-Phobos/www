<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Serpents Jobs Dashboard</title>
    <style>
      body{font-family:Inter,system-ui,Arial;margin:20px}
      table{border-collapse:collapse;width:100%}
      th,td{border:1px solid #ddd;padding:8px;text-align:left}
      th{background:#f4f4f6}
    </style>
  </head>
  <body>
    <h1>Serpents Jobs</h1>
    <button id="refresh">Refresh</button>
    <table id="tbl"><thead><tr><th>ID</th><th>Job</th><th>Status</th><th>Source</th><th>Created</th><th>Completed</th></tr></thead><tbody></tbody></table>
    <script>
      async function load(){
        const res = await fetch('/api/serpents/jobs')
        const rows = await res.json()
        const tbody = document.querySelector('#tbl tbody')
        tbody.innerHTML = ''
        for(const r of rows){
          const tr = document.createElement('tr')
          tr.innerHTML = `<td>${r.id}</td><td>${r.job_id}</td><td>${r.status}</td><td>${r.source}</td><td>${r.created_at}</td><td>${r.completed_at || ''}</td>`
          tbody.appendChild(tr)
        }
      }
      document.getElementById('refresh').addEventListener('click', load)
      load()
    </script>
  </body>
</html>
