<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEEP-Up - Create Event</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        body { margin: 0; padding: 0; background: #f3f4f6; }
        .main-content { padding: 1rem; padding-bottom: 120px; }

        .create-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .create-header { margin-bottom: 28px; }
        .create-title { font-size: 28px; font-weight: 700; color: #212529; margin: 0; }
        .create-subtitle { font-size: 14px; color: #6c757d; margin-top: 8px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-input { 
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            font-family: Inter, sans-serif;
        }
        .form-input:focus { outline: none; border-color: #667eea; }
        .form-textarea { min-height: 120px; resize: vertical; }

        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .chip {
            padding: 10px 16px;
            border: 2px solid #e9ecef;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: #495057;
        }

        .chip:hover { border-color: #667eea; }
        .chip.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: #667eea; }

        .map-container {
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
            height: 300px;
            border: 2px solid #e9ecef;
        }

        #event-map { width: 100%; height: 100%; }

        .location-info {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            align-items: center;
        }

        .location-info-text { flex: 1; }
        .location-label { font-size: 12px; color: #6c757d; }
        .location-coords { font-size: 14px; color: #495057; font-weight: 500; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .photo-upload {
            border: 2px dashed #e9ecef;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .photo-upload:hover { border-color: #667eea; background: #f8f9fa; }
        .photo-upload-icon { font-size: 32px; display: block; margin-bottom: 8px; }
        .photo-upload-text { font-size: 14px; color: #6c757d; }

        .photo-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .photo-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .photo-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #e9ecef;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f8f9fa; color: #6c757d; border: 2px solid #e9ecef; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="create-container">
            <div class="create-header">
                <h1 class="create-title">Create Event</h1>
                <p class="create-subtitle">Share something amazing with your community</p>
            </div>

            <form id="create-event-form">
                <div class="form-group">
                    <label class="form-label">📌 Event Title</label>
                    <input type="text" class="form-input" id="event-title" placeholder="Give your event a catchy name..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">📝 Description</label>
                    <textarea class="form-input form-textarea" id="event-description" placeholder="Tell people what your event is about..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">🏷️ Category</label>
                    <div class="category-chips">
                        <div class="chip" data-category="show">🎭 Show</div>
                        <div class="chip" data-category="tech">💻 Tech</div>
                        <div class="chip" data-category="outdoors">🌳 Outdoors</div>
                        <div class="chip" data-category="sport">⚽ Sport</div>
                        <div class="chip" data-category="food">🍽️ Food</div>
                        <div class="chip" data-category="social">👥 Social</div>
                    </div>
                    <input type="hidden" id="event-category" value="">
                </div>

                <div class="form-group">
                    <label class="form-label">📍 Location</label>
                    <div class="map-container">
                        <div id="event-map"></div>
                    </div>
                    <div class="location-info">
                        <div class="location-info-text">
                            <div class="location-label">Selected Location</div>
                            <div class="location-coords" id="location-display">Click map to select</div>
                        </div>
                        <div style="font-size: 24px;">📍</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">📅 Date</label>
                        <input type="date" class="form-input" id="event-date" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🕐 Time</label>
                        <input type="time" class="form-input" id="event-time" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">💰 Price</label>
                        <input type="number" class="form-input" id="event-price" placeholder="0" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">👥 Capacity</label>
                        <input type="number" class="form-input" id="event-capacity" placeholder="No limit" min="1">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">📸 Photos</label>
                    <div class="photo-upload" id="photo-upload">
                        <span class="photo-upload-icon">📷</span>
                        <span class="photo-upload-text">Click to upload photos</span>
                    </div>
                    <input type="file" id="photo-input" multiple accept="image/*" style="display: none;">
                    <div class="photo-preview" id="photo-preview"></div>
                </div>

                <div class="actions">
                    <a href="grid.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Event</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="grid.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Events</span>
        </a>
        <a href="map.html" class="nav-item">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">Map</span>
        </a>
        <a href="create.html" class="nav-item active">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Create</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        let selectedLocation = { lat: 48.8566, lng: 2.3522 };
        let eventMap = null;
        let eventPhotos = [];
        let selectedCategory = '';

        window.addEventListener('DOMContentLoaded', () => {
            // Initialize Leaflet map
            setTimeout(() => {
                eventMap = L.map('event-map').setView([selectedLocation.lat, selectedLocation.lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(eventMap);
                updateMapMarker();
                eventMap.on('click', (e) => {
                    selectedLocation = { lat: e.latlng.lat, lng: e.latlng.lng };
                    updateMapMarker();
                });
            }, 100);

            // Category selection
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    selectedCategory = chip.dataset.category;
                    document.getElementById('event-category').value = selectedCategory;
                });
            });

            // Photo upload
            const photoUpload = document.getElementById('photo-upload');
            const photoInput = document.getElementById('photo-input');
            photoUpload.addEventListener('click', () => photoInput.click());
            photoInput.addEventListener('change', handlePhotoUpload);

            // Form submission
            document.getElementById('create-event-form').addEventListener('submit', handleCreateEvent);
        });

        function updateMapMarker() {
            eventMap.eachLayer(layer => {
                if (layer instanceof L.Marker) eventMap.removeLayer(layer);
            });
            L.marker([selectedLocation.lat, selectedLocation.lng]).addTo(eventMap);
            document.getElementById('location-display').textContent = 
                `${selectedLocation.lat.toFixed(4)}, ${selectedLocation.lng.toFixed(4)}`;
        }

        function handlePhotoUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    eventPhotos.push(event.target.result);
                    renderPhotoPreview();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPhotoPreview() {
            const preview = document.getElementById('photo-preview');
            preview.innerHTML = eventPhotos.map((photo, idx) => `
                <div class="photo-item" style="background-image: url('${photo}')">
                    <button type="button" class="photo-remove" onclick="removePhoto(${idx})">✕</button>
                </div>
            `).join('');
        }

        function removePhoto(idx) {
            eventPhotos.splice(idx, 1);
            renderPhotoPreview();
        }

        function handleCreateEvent(e) {
            e.preventDefault();
            const event = {
                title: document.getElementById('event-title').value,
                description: document.getElementById('event-description').value,
                category: selectedCategory || 'other',
                location: selectedLocation,
                date: document.getElementById('event-date').value,
                time: document.getElementById('event-time').value,
                price: parseFloat(document.getElementById('event-price').value) || 0,
                capacity: parseInt(document.getElementById('event-capacity').value) || null,
                photos: eventPhotos,
                createdBy: window.loginManager?.user?.id || 'anonymous'
            };
            
            console.log('Event created:', event);
            alert('Event created successfully! (Demo mode)');
            window.location.href = 'grid.html';
        }
    </script>
</body>
</html>
