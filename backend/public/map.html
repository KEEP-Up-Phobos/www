<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEEP-Up Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            color: #111827;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        .header p {
            color: #6b7280;
            font-size: 1.1rem;
        }

        .controls {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .radius-slider {
            width: 200px;
            accent-color: #a855f7;
        }

        .radius-value {
            font-weight: 700;
            color: #a855f7;
            min-width: 60px;
            text-align: center;
            font-size: 0.9rem;
        }

        .status-indicator {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid;
        }

        .status-success {
            background: #f0f9ff;
            border-color: #0ea5e9;
            color: #0c4a6e;
        }

        .status-warning {
            background: #fef2f2;
            border-color: #f87171;
            color: #991b1b;
        }

        .map-container {
            height: 70vh;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #ffffff;
            color: #6b7280;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: #ffffff;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #a855f7;
            display: block;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .back-link {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: #ffffff;
            color: #374151;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: #f9fafb;
            color: #111827;
            transform: translateY(-1px);
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 1.5rem;
            text-decoration: none;
            color: #6b7280;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: #a855f7;
        }

        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .nav-label {
            font-size: 0.75rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .control-row {
                flex-direction: column;
                align-items: stretch;
            }

            .radius-slider {
                width: 100%;
            }

            .back-link {
                position: static;
                margin-bottom: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ KEEP-Up Map</h1>
            <p>Discover events near you with radius filtering</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label class="control-label">📍 Search Radius:</label>
                    <input type="range" id="radius-slider" class="radius-slider" min="0" max="666" value="50" step="10">
                    <span id="radius-value" class="radius-value">50 km</span>
                </div>
                <div id="location-status" class="status-indicator status-warning">
                    📍 Set your location in profile to see events near you
                </div>
            </div>
        </div>

        <div id="map-container" class="map-container">
            <div class="loading">
                <div>🗺️ Loading map...</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span id="total-events" class="stat-number">0</span>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card">
                <span id="visible-events" class="stat-number">0</span>
                <div class="stat-label">Events in Range</div>
            </div>
            <div class="stat-card">
                <span id="current-radius" class="stat-number">50</span>
                <div class="stat-label">Search Radius (km)</div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        class MapApp {
            constructor() {
                this.apiBase = window.location.origin;
                this.events = [];
                this.map = null;
                this.markers = [];
                this.currentRadius = 50;
                this.userProfile = null;
                this.init();
            }

            async init() {
                console.log('🚀 Initializing Map App...');
                await this.loadUserProfile();
                await this.loadEvents();
                this.setupControls();
                this.initMap();
                this.updateStats();
            }

            async loadUserProfile() {
                try {
                    const res = await fetch('/api/auth/check', { credentials: 'include' });
                    const data = await res.json();
                    if (data.user) {
                        // Parse location from Joomla params
                        let params = {};
                        try {
                            if (data.user.params && typeof data.user.params === 'string') {
                                params = JSON.parse(data.user.params);
                            }
                        } catch (e) {
                            console.log('Could not parse params:', e);
                        }

                        this.userProfile = {
                            id: data.user.id,
                            username: data.user.username,
                            name: data.user.name || data.user.username,
                            email: data.user.email || '',
                            location: params.location || '',
                            fullAddress: params.fullAddress || '',
                            lat: params.lat,
                            lng: params.lng
                        };
                        console.log('Loaded user profile:', this.userProfile);
                    }
                } catch (err) {
                    console.log('Not logged in or error loading profile');
                }

                // Fall back to browser geolocation when profile coordinates are not available
                if ((!this.userProfile || !this.userProfile.lat || !this.userProfile.lng) && navigator.geolocation) {
                    await new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                const lat = pos.coords.latitude;
                                const lng = pos.coords.longitude;
                                this.userProfile = this.userProfile || {};
                                this.userProfile.lat = lat;
                                this.userProfile.lng = lng;
                                this.userProfile.location = this.userProfile.location || 'Current location';
                                console.log('Geolocation fallback loaded:', this.userProfile);
                                resolve();
                            },
                            () => resolve(),
                            { timeout: 10000, enableHighAccuracy: true }
                        );
                    });
                }
            }

            async loadEvents() {
                try {
                    console.log('📊 Fetching events...');
                    const response = await fetch(`${this.apiBase}/api/events/discover`);
                    const data = await response.json();

                    if (data.ok && data.events) {
                        this.events = data.events;
                        console.log(`✅ Loaded ${this.events.length} events`);
                    }
                } catch (error) {
                    console.error('❌ Error loading events:', error);
                }
            }

            setupControls() {
                const radiusSlider = document.getElementById('radius-slider');
                const radiusValue = document.getElementById('radius-value');

                radiusSlider.value = this.currentRadius;
                radiusValue.textContent = this.currentRadius + ' km';

                radiusSlider.addEventListener('input', (e) => {
                    this.currentRadius = parseInt(e.target.value);
                    radiusValue.textContent = this.currentRadius + ' km';
                    document.getElementById('current-radius').textContent = this.currentRadius;
                    this.updateMapEvents();
                    this.updateStats();
                });
            }

            initMap() {
                const mapContainer = document.getElementById('map-container');
                mapContainer.innerHTML = '<div id="map" style="width: 100%; height: 100%;"></div>';

                // Get user's location for map center
                let centerLat = 0;
                let centerLng = 0;
                let zoomLevel = 2;

                if (this.userProfile && this.userProfile.lat && this.userProfile.lng) {
                    centerLat = this.userProfile.lat;
                    centerLng = this.userProfile.lng;
                    zoomLevel = 10;
                }

                this.map = L.map('map').setView([centerLat, centerLng], zoomLevel);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(this.map);

                this.updateLocationStatus();
                this.updateMapEvents();
            }

            updateLocationStatus() {
                const statusEl = document.getElementById('location-status');
                if (!statusEl) return;

                if (this.userProfile && this.userProfile.lat && this.userProfile.lng) {
                    statusEl.textContent = `📍 Showing events within ${this.currentRadius}km of your location`;
                    statusEl.className = 'status-indicator status-success';
                } else {
                    statusEl.textContent = '📍 Set your location in profile to see events near you';
                    statusEl.className = 'status-indicator status-warning';
                }
            }

            getEventCoords(event) {
                const lat = event.latitude ?? event.venue_latitude ?? event.lat;
                const lng = event.longitude ?? event.venue_longitude ?? event.lng;
                if (lat == null || lng == null) return null;
                const latNum = parseFloat(lat);
                const lngNum = parseFloat(lng);
                if (Number.isNaN(latNum) || Number.isNaN(lngNum)) return null;
                return { lat: latNum, lng: lngNum };
            }

            updateMapEvents() {
                if (!this.map) return;

                // Clear existing markers
                this.markers.forEach(marker => this.map.removeLayer(marker));
                this.markers = [];

                // Check if user is "testfriend" - they can see all events globally
                const isTestFriend = this.userProfile && this.userProfile.username === 'testfriend';

                const userLat = this.userProfile?.lat;
                const userLng = this.userProfile?.lng;

                const markersToAdd = [];

                this.events.forEach(event => {
                    const coords = this.getEventCoords(event);
                    if (!coords) return;

                    const distance = (userLat != null && userLng != null)
                        ? this.calculateDistance(userLat, userLng, coords.lat, coords.lng)
                        : null;

                    if (isTestFriend || (distance != null && distance <= this.currentRadius) || (userLat == null || userLng == null)) {
                        const isFamily = isTestFriend;
                        const color = isFamily ? '#ff6b6b' : '#00d4ff';
                        const border = isFamily ? '#ff5252' : '#0099ff';

                        const popupText = `<b>${event.event_name || event.title || 'Event'}</b><br>${event.artist_name || event.venue_name || ''}<br>${event.venue_name || event.location || ''}${distance != null ? `<br><small>📍 ${Math.round(distance)}km away</small>` : ''}${isFamily ? '<br><small>🌍 Global Test View</small>' : ''}`;

                        const marker = L.circleMarker([coords.lat, coords.lng], {
                            radius: 8,
                            fillColor: color,
                            color: border,
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).bindPopup(popupText).addTo(this.map);

                        this.markers.push(marker);
                        markersToAdd.push([coords.lat, coords.lng]);
                    }
                });

                // Fit map to markers when possible
                if (markersToAdd.length > 0) {
                    const bounds = L.latLngBounds(markersToAdd);
                    this.map.fitBounds(bounds, { padding: [50, 50] });
                }
            }

            calculateDistance(lat1, lng1, lat2, lng2) {
                const R = 6371; // Earth's radius in kilometers
                const dLat = this.toRadians(lat2 - lat1);
                const dLng = this.toRadians(lng2 - lng1);

                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                         Math.cos(this.toRadians(lat1)) * Math.cos(this.toRadians(lat2)) *
                         Math.sin(dLng/2) * Math.sin(dLng/2);

                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;

                return distance;
            }

            toRadians(degrees) {
                return degrees * (Math.PI / 180);
            }

            updateStats() {
                document.getElementById('total-events').textContent = this.events.length;
                document.getElementById('visible-events').textContent = this.markers.length;
                document.getElementById('current-radius').textContent = this.currentRadius;
            }
        }

        // Initialize the map app
        window.mapApp = new MapApp();
    </script>

    <nav class="bottom-nav">
        <a href="grid.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Events</span>
        </a>
        <a href="map.html" class="nav-item active">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">Map</span>
        </a>
        <a href="create.html" class="nav-item">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Create</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>
</body>
</html>
