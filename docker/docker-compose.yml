services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keepup_events
      POSTGRES_USER: keepup_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-keepup_secret}
    volumes:
      - ../pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c effective_cache_size=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c synchronous_commit=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepup_user -d keepup_events"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-As30281163}
      MARIADB_DATABASE: keepup
      MARIADB_USER: keepup
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-keepup_secret}
    volumes:
      - ../db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    command: >
      --innodb_buffer_pool_size=64M
      --innodb_log_file_size=32M
      --innodb_flush_method=O_DIRECT
      --innodb_flush_log_at_trx_commit=2
      --max_connections=50
      --tmp_table_size=16M
      --max_heap_table_size=16M
      --query_cache_type=0
      --performance_schema=OFF
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    container_name: keepup_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - ../redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 32M

  fetcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fetcher
    container_name: docker-fetcher-1
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: keepup_events
      DB_USER: keepup_user
      DB_PASSWORD: ${DB_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY}
      VIAGOGO_API_KEY: ${VIAGOGO_API_KEY:-}
      PREDICTHQ_API_KEY: ${PREDICTHQ_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change_me_in_production}
      AI_PRIMARY_MODEL: ${AI_PRIMARY_MODEL:-deepseek/deepseek-chat}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-mistralai/mistral-7b-instruct:free}
      SWEEP_INITIAL_RADIUS: ${SWEEP_INITIAL_RADIUS:-10}
      SWEEP_RADIUS_STEP: ${SWEEP_RADIUS_STEP:-15}
      SWEEP_MAX_RADIUS: ${SWEEP_MAX_RADIUS:-500}
      SWEEP_DELAY: ${SWEEP_DELAY:-30}
      API_CALL_DELAY: ${API_CALL_DELAY:-1.5}
      MAX_CONCURRENT_SWEEPS: ${MAX_CONCURRENT_SWEEPS:-15}
      UPDATE_INTERVAL_HOURS: ${UPDATE_INTERVAL_HOURS:-6}
      CYCLE_PAUSE: ${CYCLE_PAUSE:-60}
      RESWEEP_HOURS: ${RESWEEP_HOURS:-6}
      MEMORY_CAP_MB: ${MEMORY_CAP_MB:-256}
    ports:
      - "8500:8500"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 96M

  node:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: keepup_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NODE_PORT: 3002
      DB_HOST: mariadb
      PG_DB_HOST: postgres
      REDIS_HOST: redis
      DB_USER: keepup
      DB_PASSWORD: ${MARIADB_PASSWORD:-keepup_secret}
      PG_DB_USER: keepup_user
      PG_DB_PASSWORD: b4ab4f9c1c4aeb791827562b0c676910979001c7584bd4e6fd92a4b39a331c89
      REDIS_PORT: 6379
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change_me_in_production}
      JOOMLA_DB_HOST: mariadb
      JOOMLA_DB_USER: root
      JOOMLA_DB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_secret}
      NODE_OPTIONS: "--max-old-space-size=256"
    depends_on:
      - mariadb
      - postgres
      - redis
    ports:
      - "3002:3002"
    volumes:
      - ../backend:/app
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 96M

  frontend:
    image: nginx:alpine
    container_name: keepup_frontend
    restart: unless-stopped
    volumes:
      - ../frontend/react-keepup/build:/usr/share/nginx/html
      - ../frontend/react-keepup/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3001:80"
    depends_on:
      - node
      - fetcher
    deploy:
      resources:
        limits:
          memory: 48M
        reservations:
          memory: 16M

  joomla:
    image: joomla:latest
    container_name: keepup_joomla
    restart: unless-stopped
    environment:
      JOOMLA_DB_HOST: mariadb
      JOOMLA_DB_USER: root
      JOOMLA_DB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-As30281163}
      JOOMLA_DB_NAME: keepup_db
      PHP_MEMORY_LIMIT: 128M
      PHP_UPLOAD_MAX_FILESIZE: 64M
      PHP_POST_MAX_SIZE: 64M
      PHP_MAX_EXECUTION_TIME: 120
    volumes:
      - ../web:/var/www/html
      - ./php-memory.ini:/usr/local/etc/php/conf.d/memory.ini
    ports:
      - "80:80"
    depends_on:
      - mariadb
    links:
      - mariadb
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ─────────────────────────────────────────────
  # Monitoring side-deck (opt-in, non-breaking)
  # Start:  docker compose --profile monitoring up -d
  # Stop:   docker compose --profile monitoring down
  # ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: keepup_prometheus
    profiles: [monitoring]
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    deploy:
      resources:
        limits:
          memory: 192M

  grafana:
    image: grafana/grafana:latest
    container_name: keepup_grafana
    profiles: [monitoring]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: keepup2026
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3010:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: keepup_node_exporter
    profiles: [monitoring]
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    deploy:
      resources:
        limits:
          memory: 64M