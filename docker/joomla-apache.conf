<VirtualHost *:80>
    ServerAdmin admin@localhost
    ServerName localhost
    DocumentRoot /var/www/html

    # Enable necessary modules
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>

    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    # Enable gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
        AddOutputFilterByType DEFLATE application/x-httpd-php
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Cache control
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 1 week"
        ExpiresByType image/jpeg "access plus 30 days"
        ExpiresByType image/gif "access plus 30 days"
        ExpiresByType image/png "access plus 30 days"
        ExpiresByType image/webp "access plus 30 days"
        ExpiresByType image/x-icon "access plus 30 days"
        ExpiresByType image/svg+xml "access plus 30 days"
        ExpiresByType text/css "access plus 30 days"
        ExpiresByType text/javascript "access plus 30 days"
        ExpiresByType application/javascript "access plus 30 days"
        ExpiresByType application/x-javascript "access plus 30 days"
        ExpiresByType font/opentype "access plus 30 days"
        ExpiresByType font/truetype "access plus 30 days"
        ExpiresByType font/woff "access plus 30 days"
        ExpiresByType font/woff2 "access plus 30 days"
    </IfModule>

    # Disable directory listing
    <IfModule mod_autoindex.c>
        Options -Indexes
    </IfModule>

    # Main directory handling
    <Directory /var/www/html>
        Options +FollowSymLinks -MultiViews
        AllowOverride All
        Require all granted

        # Rewrite rules for Joomla SEF URLs
        <IfModule mod_rewrite.c>
            RewriteBase /
            
            # Redirect to HTTPS if needed (optional)
            # RewriteCond %{HTTPS} off
            # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

            # Allow well-known files
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d [OR]
            RewriteCond %{REQUEST_URI} ^/\.well-known/acme-challenge/
            RewriteRule ^ - [L]

            # Joomla SEF routing
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php?/$1 [L]
        </IfModule>
    </Directory>

    # Protect sensitive files
    <FilesMatch "\.php$">
        <IfModule mod_setenvif.c>
            SetEnvIfNoCase Request_URI "^\." noaccess
        </IfModule>
    </FilesMatch>

    # Deny access to sensitive directories
    <DirectoryMatch "^/(?:\.git|\.github|\.htaccess|\.htpasswd|bin|cache|cli|components/com_installer/models/.*|configuration\.php|includes|installation|language|libraries|logs|manifests|media/com_installer|modules|plugins|templates|tmp|vendor)">
        <IfModule mod_authz_core.c>
            Require all denied
        </IfModule>
        <IfModule !mod_authz_core.c>
            Order allow,deny
            Deny from all
        </IfModule>
    </DirectoryMatch>

    # Deny access to hidden files and directories
    <FilesMatch "^\.">
        <IfModule mod_authz_core.c>
            Require all denied
        </IfModule>
        <IfModule !mod_authz_core.c>
            Order allow,deny
            Deny from all
        </IfModule>
    </FilesMatch>

    # Deny access to backup and source files
    <FilesMatch "\.(sql|ini|psd|log|sh|exe|bak|bin|dat|class|tmp)$">
        <IfModule mod_authz_core.c>
            Require all denied
        </IfModule>
        <IfModule !mod_authz_core.c>
            Order allow,deny
            Deny from all
        </IfModule>
    </FilesMatch>

    # PHP settings
    <IfModule mod_php.c>
        php_value upload_max_filesize 128M
        php_value post_max_size 128M
        php_value max_execution_time 300
        php_value max_input_time 300
        php_value max_input_vars 5000
        php_value memory_limit 512M
        php_value default_charset utf-8
        php_flag short_open_tag On
        php_flag magic_quotes_gpc Off
        php_flag magic_quotes_runtime Off
        php_flag register_globals Off
        php_flag session.auto_start Off
        php_flag display_errors Off
        php_flag display_startup_errors Off
        php_value error_reporting E_ALL
    </IfModule>

    # FPM handling (if using php-fpm)
    <IfModule mod_proxy_fcgi.c>
        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost/" 
        </FilesMatch>
    </IfModule>

    # Error and access logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Enable HTTP/2
    <IfModule mod_http2.c>
        Protocols h2 http/1.1
    </IfModule>
</VirtualHost>
