server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent caching of HTML for in-app browsers (Instagram, Facebook, etc)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Handle client-side routing
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS bundles with hashes are safe to cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy /api/fetcher/ to the Python fetcher service (FastAPI on port 8500)
    # Must be BEFORE the generic /api/ block so it takes precedence
    # API key is injected server-side so it's never exposed to the browser
    location /api/fetcher/ {
        proxy_pass http://fetcher:8500/api/fetcher/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key "dae21c508f2fa0154019509c927d0ebc7a048155e872595e6e567d70c2aa0294";
        proxy_read_timeout 30s;
    }

    # Proxy ALL other /api/ and /health requests to the Node backend
    location /api/ {
        proxy_pass http://node:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location = /health {
        proxy_pass http://node:3002/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
